<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">ZT-Infra current architecture</title>
  <desc id="desc">Architecture diagram showing agent interfaces, public developer path, adapter layer, ZT-Infra control plane, AWS runtime, and evidence systems.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .group { fill: #ffffff; stroke: #d9dee8; stroke-width: 2; rx: 14; }
      .box { fill: #ffffff; stroke: #8d99aa; stroke-width: 2; rx: 10; }
      .blue { fill: #eaf3f8; stroke: #1f6f83; }
      .green { fill: #e9f6ec; stroke: #3f8f55; }
      .yellow { fill: #fff7df; stroke: #b88900; }
      .red { fill: #fff0ef; stroke: #a92828; }
      .purple { fill: #f2eefc; stroke: #6f4bb8; }
      .title { font: 700 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18202f; }
      .group-title { font: 700 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18202f; }
      .label { font: 650 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18202f; }
      .small { font: 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #596477; }
      .arrow { stroke: #596477; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .deny { stroke: #a92828; }
      .allow { stroke: #3f8f55; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#596477"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1440" height="980"/>
  <text class="title" x="48" y="58">ZT-Infra: Identity, Policy, and Audit Evidence for Autonomous Agents</text>
  <text class="small" x="48" y="84">Current MVP architecture, expanded from the first-customer interoperability diagram.</text>

  <rect class="group" x="40" y="120" width="250" height="360"/>
  <text class="group-title" x="64" y="154">Agent Interfaces</text>
  <rect class="box blue" x="64" y="180" width="200" height="48"/><text class="label" x="86" y="211">LangGraph</text>
  <rect class="box blue" x="64" y="240" width="200" height="48"/><text class="label" x="86" y="271">OpenAI</text><text class="small" x="154" y="271">Responses / Agents</text>
  <rect class="box blue" x="64" y="300" width="200" height="48"/><text class="label" x="86" y="331">MCP clients</text>
  <rect class="box blue" x="64" y="360" width="200" height="48"/><text class="label" x="86" y="391">A2A clients</text>
  <rect class="box blue" x="64" y="420" width="200" height="38"/><text class="label" x="86" y="445">Custom adapters</text>

  <rect class="group" x="40" y="530" width="250" height="250"/>
  <text class="group-title" x="64" y="564">Public Developer Path</text>
  <rect class="box purple" x="64" y="590" width="200" height="48"/><text class="label" x="86" y="621">zt-infra.org</text>
  <rect class="box purple" x="64" y="650" width="200" height="48"/><text class="label" x="86" y="681">Hello World repo</text>
  <rect class="box purple" x="64" y="710" width="200" height="48"/><text class="label" x="86" y="741">Local mock control plane</text>

  <rect class="group" x="350" y="250" width="250" height="310"/>
  <text class="group-title" x="374" y="284">Adapter Layer</text>
  <rect class="box yellow" x="374" y="315" width="200" height="70"/><text class="label" x="394" y="344">ZT client / SDK</text><text class="small" x="394" y="365">framework wrappers</text>
  <rect class="box yellow" x="374" y="420" width="200" height="78"/><text class="label" x="394" y="450">Execution broker</text><text class="small" x="394" y="471">or guarded function</text>

  <rect class="group" x="660" y="190" width="310" height="420"/>
  <text class="group-title" x="684" y="224">ZT-Infra Control Plane</text>
  <rect class="box green" x="696" y="255" width="230" height="60"/><text class="label" x="722" y="291">POST /actions</text>
  <rect class="box green" x="696" y="345" width="230" height="60"/><text class="label" x="722" y="381">Policy evaluator</text>
  <path class="box green" d="M811 440 L926 500 L811 560 L696 500 Z"/>
  <text class="label" x="772" y="496">allow</text><text class="label" x="818" y="496">/ deny</text><text class="small" x="764" y="518">decision</text>

  <rect class="group" x="1030" y="120" width="350" height="360"/>
  <text class="group-title" x="1054" y="154">Private AWS MVP Runtime</text>
  <rect class="box blue" x="1060" y="180" width="290" height="52"/><text class="label" x="1084" y="212">Terraform VPC, no public ingress</text>
  <rect class="box blue" x="1060" y="250" width="290" height="52"/><text class="label" x="1084" y="282">Ubuntu EC2 instance</text>
  <rect class="box blue" x="1060" y="320" width="290" height="52"/><text class="label" x="1084" y="352">zt-provisioner localhost:3000</text>
  <rect class="box blue" x="1060" y="390" width="135" height="52"/><text class="label" x="1084" y="422">Tailscale</text>
  <rect class="box blue" x="1215" y="390" width="135" height="52"/><text class="label" x="1248" y="422">SSM</text>

  <rect class="group" x="1030" y="540" width="350" height="330"/>
  <text class="group-title" x="1054" y="574">Evidence and Detection</text>
  <rect class="box red" x="1060" y="600" width="290" height="48"/><text class="label" x="1084" y="631">ActionAuditor</text>
  <rect class="box red" x="1060" y="660" width="135" height="52"/><text class="label" x="1098" y="692">AWS KMS</text>
  <rect class="box red" x="1215" y="660" width="135" height="52"/><text class="label" x="1238" y="692">CloudWatch</text>
  <rect class="box red" x="1060" y="730" width="135" height="52"/><text class="label" x="1094" y="762">DAAL</text><text class="small" x="1086" y="778">optional async</text>
  <rect class="box red" x="1215" y="730" width="135" height="52"/><text class="label" x="1238" y="762">GuardDuty</text>
  <rect class="box red" x="1060" y="800" width="290" height="44"/><text class="label" x="1084" y="828">/var/log/zt-verify.json</text>

  <path class="arrow" d="M290 300 C330 300 330 350 374 350"/>
  <path class="arrow" d="M290 670 C330 670 330 368 374 368"/>
  <path class="arrow" d="M574 350 C625 350 625 285 696 285"/>
  <path class="arrow" d="M926 285 C980 285 980 346 1060 346"/>
  <path class="arrow" d="M811 315 L811 345"/>
  <path class="arrow" d="M811 405 L811 440"/>
  <path class="arrow deny" d="M926 500 C984 500 984 624 1060 624"/>
  <path class="arrow allow" d="M696 500 C640 500 640 459 574 459"/>
  <path class="arrow" d="M574 459 C650 610 960 612 1060 624"/>
  <path class="arrow" d="M1205 480 L1205 540"/>
  <path class="arrow" d="M1205 648 L1128 660"/>
  <path class="arrow" d="M1205 648 L1282 660"/>
  <path class="arrow" d="M1205 648 L1128 730"/>
  <path class="arrow" d="M1205 648 L1282 730"/>
  <path class="arrow" d="M1205 648 L1205 800"/>

  <text class="small" x="600" y="902">Current API: POST /actions. Future candidates include canonical agent identity, attestation, trust bundles, /identity/token, and richer /authorize APIs.</text>
</svg>
